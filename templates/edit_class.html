{% extends "layout.html" %}
{% block body %}
<div class="student">
   <div class="col-md-4 offset-md-4">
      <div class="card card-body">
         <form action="{{ url_for('update_class', id=classes.class_number) }}" method="POST">
            <div class="form-group">
               <input type="text" name="class_number" value="{{classes.class_number}}" class="form-control" readonly>
            </div>
            <div class="form-group">
               <input type="text" name="class_name" value="{{classes.class_name}}" class="form-control">
            </div>
            <div class="form-group">
               <button type="submit" class="btn btn-primary btn-block">
                  Оновити
               </button>
            </div>
         </form>
      </div>
   </div>
</div>
{% endblock %}
