{% extends "layout_student.html" %}
{% block body %}
<div class="homework">
   <h3>Моє ДЗ</h3>
</div>
<div class="homework">
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Дата</td>
               <td>Предмет</td>
               <td>Домашнє завдання</td>
               <td>Виконано</td> <!-- Додали новий стовпчик -->
            </tr>
         </thead>
         <tbody>
            {% for homework in homework %}
            <tr>
               <td>{{ homework[0] }}</td>
               <td>{{ homework[1] }}</td>
               <td>{{ homework[2] }}</td>
               <td>
                  <input type="checkbox" id="todo{{ loop.index }}" name="todo{{ loop.index }}" value="{{ loop.index }}">
                  <label for="todo{{ loop.index }}"></label>
               </td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

<script>
   // Функція для закреслення рядків та зміни кольору при відмічанні чекбокса
   $('input[type="checkbox"]').change(function () {
      var row = $(this).closest('tr');
      if ($(this).is(":checked")) {
         row.css('text-decoration', 'line-through');
         row.css('color', 'lightgray');
      } else {
         row.css('text-decoration', 'none');
         row.css('color', 'black');
      }
   });
</script>

{% endblock %}
