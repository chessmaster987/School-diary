{% extends "layout_student.html" %}
{% block body %}
<div class="homework">
   <h3>Моє ДЗ</h3>
</div>
<div class="homework">
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Дата</td>
               <td>Предмет</td>
               <td>Домашнє завдання</td>
            </tr>
         </thead>
         <tbody>
            {% for homework in homework %}
            <tr>
               <td>{{ homework[0] }}</td>
               <td>{{ homework[1] }}</td>
               <td>{{ homework[2] }}</td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
