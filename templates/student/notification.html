{% extends "layout_student.html" %}
{% block body %}
<div class="notif">
   <h3>Мої оповіщення</h3>
</div>
<div class="notif">
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Дата</td>
               <td>Вчитель</td>
               <td>Текст оповіщення</td>
            </tr>
         </thead>
         <tbody>
            {% for notif in notif %}
            <tr>
               <td>{{ notif[0] }}</td>
               <td>{{ notif[1] }}</td>
               <td>{{ notif[2] }}</td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
