{% extends "layout_student.html" %}
{% block body %}
<div class="my_teachers">
   <h3>Мої вчителі</h3>
</div>
<div class="my_teachers">
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Викладач</td>
               <td>Предмет, який веде</td>
            </tr>
         </thead>
         <tbody>
            {% for teacher in my_teachers %}
            <tr>
               <td>{{ teacher[0] }}</td>
               <td>{{ teacher[1] }}</td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
