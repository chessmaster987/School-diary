{% extends "layout_student.html" %}
{% block body %}
<div class="comment">
   <h3>Коментарі вчителів</h3>
</div>
<div class="comment">
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Дата</td>
               <td>Предмет</td>
               <td>Коментар</td>
            </tr>
         </thead>
         <tbody>
            {% for comment in comment_data %}
            <tr>
               <td>{{ comment[0] }}</td>
               <td>{{ comment[1] }}</td>
               <td>{{ comment[2] }}</td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
