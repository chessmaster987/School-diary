{% extends "layout.html" %}
{% block body %}
<div class="teacher">
   <div class="col-md-4 offset-md-4">
      <div class="card card-body">
         <form action="/update_teacher/{{teacher.login}}" method="POST">
            <div class="form-group">
               <input type="text" name="login" value="{{teacher.login}}" class="form-control">
            </div>
            <div class="form-group">
               <input type="text" name="password" value="{{teacher.password}}" class="form-control">
            </div>
            <div class="form-group">
               <input type="text" name="full_name" value="{{teacher.full_name}}" class="form-control">
            </div>
            <div class="form-group">
               <input type="text" name="class_number" value="{{teacher.class_number}}" class="form-control">
            </div>
            <div class="form-group">
               <button type="submit" class="btn btn-primary btn-block">
                  Update
               </button>
            </div>
         </form>
      </div>
   </div>
</div>
{% endblock %}
