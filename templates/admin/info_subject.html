{% extends "layout.html" %}
{% block body %}
<div class="student">
   <h3>Інформація про предмети</h3>
</div>
<div class="student">
   <div class="col-md-4">
      <div class="card card-body">
         <form action="{{url_for('add_subject')}}" method="POST">
            <div class="form-group">
               <input type="text" class="form-control" name="subject_name" placeholder="Назва предмету">
            </div>
            <button class="btn btn-primary btn-block">
               Save
            </button>
         </form>
      </div>
   </div>
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Subject ID</td>
               <td>Назва предмету</td>
            </tr>
         </thead>
         <tbody>
            {% for subject in subject_data %}
            <tr>
               <td>{{ subject[0] }}</td>
               <td>{{ subject[1] }}</td>
               <td width="130">
                  <a href="/edit_subject/{{subject[0]}}" class="btn btn-secondary btn-sm">edit</a>
                  <a href="/delete_subject/{{subject[0]}}" class="btn btn-danger btn-delete btn-sm">delete</a>
               </td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
