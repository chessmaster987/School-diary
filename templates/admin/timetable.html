{% extends "layout.html" %}
{% block body %}
<div class="teacher">
   <h3>Штатний розпис</h3>
</div>
<div class="teacher">
   <div class="col-md-4">
      <div class="card card-body">
         <form action="{{url_for('add_timetable')}}" method="POST">
            <div class="form-group">
               <input type="text" class="form-control" name="subject_name" placeholder="ID Предмету">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="teacher_name" placeholder="ID Вчителя">
            </div>
            <button class="btn btn-primary btn-block">
               Save
            </button>
         </form>
      </div>
   </div>
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Timetable ID</td>
               <td>Назва предмету</td>
               <td>Логін</td>
               <td>Full Name</td>
            </tr>
         </thead>
         <tbody>
            {% for timetable in timetable_data %}
            <tr>
               <td>{{ timetable[0] }}</td>
               <td>{{ timetable[1] }}</td>
               <td>{{ timetable[2] }}</td>
               <td>{{ timetable[3] }}</td>
               <td width="130">
                  <a href="/edit_timetable/{{timetable[0]}}" class="btn btn-secondary btn-sm">edit</a>
                  <a href="/delete_timetable/{{timetable[0]}}" class="btn btn-danger btn-delete btn-sm">delete</a>
               </td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
