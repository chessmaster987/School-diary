{% extends "layout.html" %}
{% block body %}
<div class="teacher">
   <h3>Інформація про вчителів</h3>
</div>
<div class="teacher">
   <div class="col-md-4">
      <div class="card card-body">
         <form action="{{url_for('add_teacher')}}" method="POST">
            <div class="form-group">
               <input type="text" class="form-control" name="teacher_login" placeholder="Логін вчителя">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="teacher_password" placeholder="Пароль вчителя">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="teacher_name" placeholder="ФІО вчителя">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="teacher_class" placeholder="Клас вчителя">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="teacher_role" placeholder="Role" value="teacher">
            </div>
            <button class="btn btn-primary btn-block">
               Save
            </button>
         </form>
      </div>
   </div>
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Логін</td>
               <td>Teacher ID</td>
               <td>Пароль</td>
               <td>ФІО вчителя</td>
            </tr>
         </thead>
         <tbody>
            {% for teacher in teacher_data %}
            <tr>
               <td>{{ teacher[0] }}</td>
               <td>{{ teacher[1] }}</td>
               <td>{{ teacher[2] }}</td>
               <td>{{ teacher[3] }}</td>
               <td width="130">
                  <a href="/edit_teacher/{{teacher[0]}}" class="btn btn-secondary btn-sm">edit</a>
                  <a href="/delete_teacher/{{teacher[0]}}" class="btn btn-danger btn-delete btn-sm">delete</a>
               </td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
