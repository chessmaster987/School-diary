{% extends "layout.html" %}
{% block body %}
<div class="class">
   <h3>Інформація про класи</h3>
</div>
<div class="class">
   <div class="col-md-4">
      <div class="card card-body">
         <form action="{{url_for('add_class')}}" method="POST">
            <div class="form-group">
               <input type="text" class="form-control" name="class_name" placeholder="Назва класу">
            </div>
            <button class="btn btn-primary btn-block">
               Зберегти
            </button>
         </form>
      </div>
   </div>
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>ID Класу</td>
               <td>Назва класу</td>
            </tr>
         </thead>
         <tbody>
            {% for classes in classes_data %}
            <tr>
               <td>{{ classes[0] }}</td>
               <td>{{ classes[1] }}</td>
               <td width="130">
                  <a href="/edit_class/{{classes[0]}}" class="btn btn-secondary btn-sm">edit</a>
                  <a href="/delete_class/{{classes[0]}}" class="btn btn-danger btn-delete btn-sm">delete</a>
               </td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
