{% extends "layout.html" %}
{% block body %}
<div class="student">
   <h3>Students</h3>
</div>
<div class="student">
   <div class="col-md-4">
      <div class="card card-body">
         <form action="{{url_for('add_student')}}" method="POST">
            <div class="form-group">
               <input type="text" class="form-control" name="login" placeholder="Login">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="password" placeholder="Password">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="full_name" placeholder="Full Name">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="class_number" placeholder="Class Number">
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="student_role" placeholder="Role" value="student">
            </div>
            <button class="btn btn-primary btn-block">
               Save
            </button>
         </form>
      </div>
   </div>
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Login</td>
               <td>Password</td>
               <td>Full Name</td>
               <td>Class Name</td>
            </tr>
         </thead>
         <tbody>
            {% for student in student_data %}
            <tr>
               <td>{{ student[0] }}</td>
               <td>{{ student[1] }}</td>
               <td>{{ student[2] }}</td>
               <td>{{ student[3] }}</td>
               <td width="130">
                  <a href="/edit/{{student[0]}}" class="btn btn-secondary btn-sm">edit</a>
                  <a href="/delete/{{student[0]}}" class="btn btn-danger btn-delete btn-sm">delete</a>
               </td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
