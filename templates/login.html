<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Авторизація</title>
   <style>
      body {
         background-color: #3498db;
         /* голубой фон */
         display: flex;
         align-items: center;
         justify-content: center;
         height: 100vh;
         margin: 0;
         color: black;
         /* цвет текста */
      }

      form {
         background-color: rgba(255, 255, 255, 0.9);
         /* полупрозрачный белый фон формы */
         padding: 20px;
         border-radius: 10px;
         text-align: center;
      }

      img {
         width: auto;
         height: auto;
         margin-bottom: 20px;
         display: block; /* Це додається для центрування по горизонталі */
         margin-left: auto;
         margin-right: auto;
      }

      label {
         display: block; /* Це додається для розташування міток та полів вводу по вертикалі */
         margin-bottom: 5px;
      }

      input {
         width: 100%; /* Робить поля вводу 100% шириною форми */
         padding: 8px; /* Додає відступи для кращого вигляду */
         box-sizing: border-box; /* Враховує відступи та границі в розрахунок ширини */
         margin-bottom: 10px;
      }
   </style>
</head>
<body>
   <!--  <h2>Авторизація</h2>  -->
   <form method="post" action="">
      <h2>Авторизація</h2>
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Логотип">
      <label for="username">Логін:</label>
      <input type="text" id="username" name="username"><br><br>

      <label for="password">Пароль:</label>
      <input type="password" id="password" name="password"><br><br>

      <input type="submit" value="Увійти">
   </form>
</body>

</html>
