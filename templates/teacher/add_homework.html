{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
   <h3>Додавання нового ДЗ</h3>
</div>
<div class="teacher">
   <div class="col-md-4">
      <div class="card card-body">
         <form action="{{url_for('add_homework')}}" method="POST">
            <input type="text" id="start_date" name="start_date">
            <div class="form-group">
               <label for="teacher_subject">Предмет</label>
               <select class="form-control" name="teacher_subject" id="teacher_subject">
                  {% for subject in teacher_subjects %}
                  <option value="{{ subject }}">{{ subject }}</option>
                  {% endfor %}
               </select>
            </div>
            <div class="form-group">
               <input type="text" class="form-control" name="homework_description" placeholder="Опис ДЗ">
            </div>
            <button class="btn btn-primary btn-block">
               Save
            </button>
         </form>
      </div>
   </div>
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Номер ДЗ</td>
               <td>Дата домашнього завдання</td>
               <td>Назва предмету</td>
               <td>Описання домашнього завдання</td>
            </tr>
         </thead>
         <tbody>
            {% for teacher in teacher_homework %}
            <tr>
               <td>{{ teacher[0] }}</td>
               <td>{{ teacher[1] }}</td>
               <td>{{ teacher[2] }}</td>
               <td>{{ teacher[3] }}</td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
