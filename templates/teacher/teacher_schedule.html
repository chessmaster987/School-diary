{% extends "layout_teacher.html" %}
{% block body %}
<div class="my_schedule">
   <h3>Розклад занять школи</h3>
</div>
<div class="my_schedule">
   <div class="col-md-8">
      <table id="example" class="table table-striped table-bordered" style="width:100%">
         <thead>
            <tr>
               <td>Клас</td>
               <td>День тижня</td>
               <td>Номер пари</td>
               <td>Назва предмету</td>
               <td>Викладач</td>
            </tr>
         </thead>
         <tbody>
            {% for schedule in schedule_data %}
            <tr>
               <td>{{ schedule[0] }}</td>
               <td>{{ schedule[1] }}</td>
               <td>{{ schedule[2] }}</td>
               <td>{{ schedule[3] }}</td>
               <td>{{ schedule[4] }}</td>
            </tr>
            {% endfor %}
         </tbody>
      </table>
   </div>
</div>
</div>

{% endblock %}
