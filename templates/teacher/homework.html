{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
   <h3>Обрати клас для додавання ДЗ</h3>
</div>
<div class="teacher">
</div>
<div class="col-md-8">
   <table id="example" class="table table-striped table-bordered" style="width:100%">
      <thead>
         <tr>
            <td>Клас</td>
            <td>Обрати</td>
         </tr>
      </thead>
      <tbody>
         {% for teacher in teacher_classes %}
         <tr>
            <td>{{ teacher[0] }}</td>
            <td><button><a href="{{ url_for('add_homework', class_name=teacher[0]) }}">Детальніше</a></button></td>
         </tr>
         {% endfor %}
      </tbody>
   </table>
</div>
</div>
</div>

{% endblock %}
