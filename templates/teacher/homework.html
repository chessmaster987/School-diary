{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
   <h3>Обрати клас для додавання ДЗ</h3>
</div>
<div class="teacher">
</div>
<div class="col-md-8">
   <table id="example" class="table table-striped table-bordered" style="width:100%">
      <thead>
         <tr>
            <td>Клас</td>
            <td>Обрати</td>
         </tr>
      </thead>
      <tbody>
         {% for teacher in teacher_classes %}
         <form method="post"><tr>
            <td>{{ teacher[1] }}</td>
            <td>
               <button type="submit" name="selected_class" value="{{ teacher[0] }}">Детальніше</button>
            </td>
         </form></tr>
         {% endfor %}
      </tbody>
   </table>
</div>
</div>
</div>

{% endblock %}
