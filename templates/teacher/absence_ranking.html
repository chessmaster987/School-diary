{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
    <h3>Звіт по пропускам учнів класу</h3>
</div>
<div class="teacher">
</div>
<div class="col-md-4">
    <div class="card card-body">
        <form action="#"
            method="POST">
            <label for="start_date">Початкова дата:</label>
            <input type="text" id="start_date" name="start_date"><br>
            <label for="end_date">Кінцева дата:</label><br>
            <input type="text" id="end_date" name="end_date"><br><br>
            <label for="class_name">Оберіть клас</label><br>
            <select class="form-control" name="class_name" id="class_name">
                {% for class_name in class_data %}
                    <option value="{{ class_name[0] }}">{{ class_name[1] }}</option>
                {% endfor %}
            </select>

            <button type="submit">Отримати дані</button>
        </form>
    </div>
</div>
<div class="col-md-8">
    <table id="example" class="table table-striped table-bordered" style="width:100%">
        <thead>
            <tr>
                <td>Учень</td>
                <td>Кількість пропусків учня</td>
            </tr>
        </thead>
        <tbody><!--виправити авг грєйдс-->
            {% for presence in presence_data %}
            <tr>
                <td>{{ presence[0] }}</td>
                <td>{{ presence[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</div>
</div>

{% endblock %}
