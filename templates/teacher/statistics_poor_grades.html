<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <h2>Student Marks Table</h2>
    <table border="1">
        <tr>
            <th>Student Login</th>
            {% for subject in subjects %}
            <th>{{ subject }}</th>
            {% endfor %}
        </tr>
        {% for student_login, marks in table_data.items() %}
        <tr>
            <td>{{ student_login }}</td>
            {% for subject in subjects %}
            <td>{{ marks.get(subject, 0) }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
</body>

</html>
