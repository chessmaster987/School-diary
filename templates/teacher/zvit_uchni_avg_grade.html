{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
   <h3>Звіт по оцінкам учня {{session['selected_student']}}</h3>
</div>
<div class="teacher">
</div>
<div class="col-md-4">
   <div class="card card-body">
      <form action="{{ url_for('zvit_uchni_avg_grade', selected_student=session['selected_student']) }}" method="POST">
         <label for="start_date">Початкова дата:</label>
         <input type="text" id="start_date" name="start_date"><br>

         <label for="end_date">Кінцева дата:</label><br>
         <input type="text" id="end_date" name="end_date"><br><br>

         <button type="submit">Відправити</button>
      </form>
   </div>
</div>
<div class="col-md-8">
   <table id="example" class="table table-striped table-bordered" style="width:100%">
      <thead>
         <tr>
            <td>Предмет</td>
            <td>Середня оцінка</td>
         </tr>
      </thead>
      <tbody>
         {% for teacher in avg_grades %}
         <tr>
            <td>{{ teacher[0] }}</td>
            <td>{{ teacher[1] }}</td>
         </tr>
         {% endfor %}
      </tbody>
   </table>
</div>
</div>
</div>

{% endblock %}
