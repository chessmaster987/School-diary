{% extends "layout_teacher.html" %}
{% block body %}
<div class="notif_classes">
   <h3>Додати оповіщення для класу:</h3>
</div>
<div class="notif_classes">
<div class="col-md-4">
   <div class="card card-body">
      <form action="{{url_for('add_classes_notif')}}" method="POST">
         <!--<div class="form-group">
            <input type="text" class="form-control" name="class_number" placeholder="Номер класу">
         </div> -->
         <select class="form-control" name="teacher_classes" id="teacher_classes">
            {% for class_number in teacher_classes %}
            <option value="{{ class_number[0] }}">{{ class_number[1] }}</option>
            {% endfor %}
         </select>
         <div class="form-group">
            <input type="text" class="form-control" name="notif_text" placeholder="Текст оповіщення">
         </div>
         <button class="btn btn-primary btn-block">
            Зберегти
         </button>
      </form>
   </div>
</div>
<div class="col-md-8">
   <table id="example" class="table table-striped table-bordered" style="width:100%">
      <thead>
         <tr>
            <td>№</td>
            <td>Дата</td>
            <td>Клас</td>
            <td>Оповіщення</td>
         </tr>
      </thead>
      <tbody>
         {% for notif in notif_classes_data %}
         <tr>
            <td>{{ notif[0] }}</td>
            <td>{{ notif[1] }}</td>
            <td>{{ notif[2] }}</td>
            <td>{{ notif[3] }}</td>
            <td width="130">
               <a href="/edit_classes_notif/{{notif[0]}}" class="btn btn-secondary btn-sm">edit</a>
               <a href="/delete_classes_notif/{{notif[0]}}" class="btn btn-danger btn-delete btn-sm">delete</a>
            </td>
         </tr>
         {% endfor %}
      </tbody>
   </table>
</div>
</div>

{% endblock %}
