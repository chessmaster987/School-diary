{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
    <h3>Оберіть клас та дію</h3>
</div>
<div class="teacher">
    <div>
        <div class="col-md-8">
            <table id="example" class="table table-striped table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <td>Клас</td>
                        <td>Обрати дію</td>
                        <td>Обрати дію</td>
                    </tr>
                </thead>
                <tbody>
                    {% for teacher in teacher_classes %}
                    <tr>
                        <td>{{ teacher[0] }}</td>
                        <td><a href="{{ url_for('teacher_lesson', class_name=teacher[0]) }}">Зареєструвати нове заняття</a></td>
                        <td><a href="{{url_for('show_teacher_lessons', class_name=teacher[0])}}">Відкрити перелік проведених занять</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
