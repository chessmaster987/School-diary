{% extends "layout_teacher.html" %}
{% block body %}
<div class="teacher">
    <div class="col-md-4 offset-md-4">
        <div class="card card-body">
            <form action="{{ url_for('update_show_lessons', id=grade.grade_number) }}" method="POST">
                <div class="form-group">
                    <input type="text" name="grade" value="{{grade.grade}}" class="form-control">
                </div>
                <div class="form-group">
                    <input type="text" name="grade_type" value="{{grade.grade_type}}" class="form-control">
                </div>
                <div class="form-group">
                    <input type="text" name="presence_mark" value="{{grade.presence_mark}}" class="form-control">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">
                        Update
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
